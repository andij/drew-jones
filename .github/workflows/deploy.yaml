name: Deploy to Unraid

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: [self-hosted, linux] # Targets your local Unraid Docker container
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      # Since the runner is a fresh Docker container, we might need to install Node
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 18

      - name: Install Dependencies
        run: npm ci

      - name: Build Eleventy
        run: npm run build
        # This usually outputs to the '_site' directory by default

      - name: Deploy to Nginx Folder
        run: |
          # Clear old files
          rm -rf /mnt/drew-jones/*
          # Copy new files
          cp -r _site/* /mnt/drew-jones/
          # Fix permissions so Nginx can read them
          chmod -R 755 /mnt/drew-jones
